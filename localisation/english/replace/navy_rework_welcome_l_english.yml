 navy_rework_welcome_splash_tab_1_content: "§RThe change notes are directly copied from VNR. In case you are confused by some of the lines here, please be aware that KR/KXNR only contains generic updates on techs, modules and mechanics.§!\n\n§Hv2.10 \"Blood on Okinawa Beach\"§!\n\n§CNotable Changes:§!\n\n-Greatly improve AI fleet logics.\n-VNR on Github now supports an AI agent to customize and improve AI scripting, you can use it with coding assistant such as Copilot to do secondary development.\n-New Ships: Amphibious Assault Ship\n-New Techs: Amphibious Assault\n-New Modules: Amphibious Assault Command, Assault Helicopter, Hovercraft, Deck Gun (lvl 1-4)\n-Add a new track of doctrines: Naval Logistics.\n-New Doctrines: Coverted Oceanic Replenishment, Industrialized Naval Logistics, Trade & Supply Network, Defensive Combat Support\n\n§CUpdates:§!\n\n-Base positioning is increased to 70%.\n-Max damage reduction from fleet antiair is changed to 75%.\n-Slightly reduce retreat speed.\n-Lower damage caused by CV bomber.\n-Reduce base manpower on hulls, apply manpower modifier on most modules.\n-Reduce detection stats of carrier and its hangar modules.\n-Large armored hangar no longer degrades org.\n-Rebalance some armor and gun piercing.\n-Carrier has org modifiers applied to different tiers of hulls now.\n-Add general positioning bonus to all surface fleet doctrines.\n-Add visibility reduction bonus to submarine doctrines.\n-Convoy raiding doctrines can now reduce ships' visibility.\n-Largely reduce submarine expose period from 20 hrs to 10 hrs.\n-Reduce visibility penalty on sub torpedo modules.\n-Remove damage control and fire control techs in naval support tree.\n-Merge some naval mine techs together.\n-US AI will have a higher tendency to abandon Guam and the Philippines to concentrate its forces before Japan declares war.\n-US AI will help UK in the Mediterranean against Italy if it has plenty of carriers.\n-US AI will defend and patrol the East Coast if UK has surrendered to Germany or Italy.\n-Adjust AI's fleet composition.\n-AI will check its carrier/screen ratio before switch to emergency destroyer production.\n-AI should correctly assign traits to its admirals now.\n-Reduce prototype duration of some naval special projects.\n-Panzerschiff can no longer equip heavy guns, update to its roles depicting its usage as convoy raider or early attempt of large cruiser.\n-Reduce base dominance factor on carrier and battleship hulls.\n-Restrict some smaller carriers from applying armored flight deck.\n-Revert CV plane squad size on land to 100.\n-Update some lines in guide.\n\n§CFixes:§!\n\n-All ship models from the cosmetics pack-Warship of the Pacific-is available in the mod.\n-Fixed Japan AI will rejoin 2nd LNT.\n-Fixed nuclear torpedo project using hidden tech of nuke as its dependency.\n-Fixed some missing loc in doctrine system.\n\nThank you for playing my mod."
 navy_rework_welcome_splash_tab_2_content: "§HEvery bit you want to know about Naval Rework will be listed here.§!\n\n§CDesigner-§!\n£white_dot When designing a §Ydestroyer§!, §Ycruiser§! or §Ybattleship§!, the §Ymain gun§! is the only thing reflecting reality here. Since their firepower and AP are balanced, §Rplease make sure that their numbers are close to reality§!. Modules including §Ysecondaries§! and §Ytorpedo§! are the same as vanilla.\n£white_dot Some restricted modules are unlocked in the mod, you can build battleships with super heavy guns, heavy cruisers with light guns and unprotected cruisers.\n£white_dot Ship roles are essential on destroyers and cruisers, they can offer different bonuses and unlock special modules.\n£white_dot For cruisers, whether it's capital is not decided by its caliber. All cruisers (except panzerschiff) start as screen ship by default, and need special roles to make them capital ships.\n£white_dot §YMissiles§! can be installed on later heavy and cruiser hulls, but the latter needs missile cruiser role to unlock.\n£white_dot The screen to capital ratio to achieve max screen efficiency is 2 in this mod.\n£white_dot Torpedoes can do great damage to heavy ships, while armor can only defend a little, you have to install §Ytorpedo defense system§! to avoid that.\n£white_dot The AP of main guns is rebalanced based on certain rules. The basic AP is 1.1 times greater than armor of the same year, meaning that ordinary steel and mixed scheme can reject penetration, while the succeeded guns can pierce it even with all-or-nothing scheme.\n£white_dot The piercing and damage are calculated in the following way, the mapping between piercing-armor ratio and damage: >200% -> 200% damage, 100%~200% -> 100% damage, 85%~100% -> 70% damage, 75%~85% -> 60% damage, 70%~75% -> 45% damage, 65%~70% -> 35% damage, 60%~65% -> 20% damage, 55%~60% -> 10% damage, 50%~55% -> 5% damage, 30%~50% -> 2% damage, <30% -> 1% damage.\n£white_dot The §Ysuper heavy guns§! are grouped with §Yheavy guns§! based on their mounting, but they are still restricted to be installed on certain ship hulls.\n£white_dot The ship role icon in the designer can help you better manage your fleet. It only indicates the definition of this ship for the country you are playing.\n£white_dot Auxiliary ships are fragile, but they have super long range. As the max range of your fleet is decided by average range of all composed ships, it will increase the max range by having some auxiliary ships.\n\n§CTech Tree-§!\n£white_dot Although the appearance of tech tree is changed, its core is still simialr to vanilla, you don't need another hour to find out how it works.\n£white_dot Not all techs are valuable, make your choice wisely based on your strategy and geopolitical situation.\n£white_dot To unlock the sub techs, you will need the hull tech to be researched. Some sub techs also require the progress of other non-naval techs. For example, passive sonar leads to active sonar, and some fire control systems and missiles take engineering techs as prerequisites.\n\n§CNaval Battle-§!\n£white_dot The minimum time of naval combat is §Yincreased to 20 hrs, capital ships fire at 22, other ships 30§!, while §Gcarriers are able to launch attacks from the very beginning§!. §YThe carrier stacking limit§! is lifted to 6. The way you use CV naval bomber is more decisive here.\n£white_dot Ship AA guns and CV fighters are buffed with extra damage and targetting. Carrier taskforce without fighters' cover could lose more bombers.\n£white_dot Base positioning is reduced to 50%, but superior detection can give a positioning bonus up to 20%.\n£white_dot Positioning penalty from deathstacking is increased to 50% of for every doubling of enemy ships, capped to 300%. The penalty only starts to take effect when fleet size is over 40.\n£white_dot Airplane launcher, carrier and sonar are more useful and stronger in anti-submarine warfare, while the base §Yvisibility§! of §Ysubmarines§! has been §Rincreased§!, making it less dominant against surface fleet with good sub detection.\n£white_dot AIs are intentionally designed to produce §Yhistorical and realistic ships§!, instead of meta ones. Although these designs are way better than vanilla, conventional metas will still have great advantage.\n\n§CMiscellaneous-§!\n£white_dot The production of a single dockyard is increased to §G160%§! (customizable at rule setup), normally it takes five dockyards 1-2 years to build a battleship without any output bonus.\n£white_dot AI of major powers will unlock a series of naval techs and unique ship designs (can be turned off at rule setup) in 1940, 1943, 1945 and cold-war era.\n£white_dot AI will take different naval production (including carrier plane) strategies according to its historical doctrine and status of war. For instance, §gGermany§! in vanilla will focus on submarines, while §BUSA§! will emphasize carriers."
 navy_rework_welcome_splash_tab_3_content: "§HAdditional information about Naval Rework will be listed here.§!\n\n§CComaptibility-§!\n£white_dot This mod is not compatible with mods editing the tech tree unless there is a §Ycompatch§!, links of existing compatches are listed in workshop page.\n£white_dot §RAll national focus/events/decisions which grants you ship designs will be broken for the sake of compatibility.§!\n\n§CRe-creation-§!\n£white_dot No official compatch will ever be made except for RT56, but the community is encouraged to do that.\n£white_dot Everyone is allowed to use any resources (code/GFX/text) from this mod, but please mark the credit and notify me first."
 navy_rework_welcome_splash_tab_4_content: "Hi Everyone, this is the creator of the mod, MrPunk. The Navy Rework franchise has a long history of development starting from 2022, and by now it has featured a realistic designer, historical order of battle, unique icons, reworked techtree, and a new doctrine system. With the framework set, extensions will be easier for both me and other content creators working on my mod. I'd like to take this opportunity to share the past and future of this mod.\n\nThe project has a bond with one of the greatest mods ever, Kaiserreich, which I learned about almost immediately after I bought HOI4 in 2016 during v0.6: the Nightmare of Garibaldi. On top of a more detailed alt-history scenario than vanilla, I fell in love with the naval rework by KR released in v0.8, and couldn't help imagining what those fictional dreadnoughts would look like in a world without the Washington Naval Treaty.\n\nOn a Friday afternoon just before the Chinese New Year, 2021, I was sitting in the office and suddenly came across an extraordinary article about Canadian and Japanese Navy in the KR world by Tragic-tragedy on Reddit. I translated and shared it with the Chinese HOI4 community, and then started my own blogs about naval history of KR, in which it has laid the foundation for this mod.\n\nSadly, KR's naval system had been cut before its v0.22 release for various technical reasons. Despite my hard feelings, it also gave me motivation and determination to do something I had never imagined. The process was not easy. I majored coding at college and work but had to learn photoshop and English writing from scratch. With heritage from KR's former naval rework, the original mod of the series, KR Naval Rework, was released in 2022, and saw its successor of KX and finally vanilla version.\n\nI want to express my sincere thanks to my friends from the HOI4 community. You have been enriching this franchise with solid historical details, fabulous ideas, and extensive benchmark tests. You are real heroes. And for players, thank you for subscribing this mod and I wish you well.\n\nI'd also like to thank my grandpa who served in PLA Navy for decades and has inspired me when I was a kid. He worked as commissar and meteorologist aboard several naval science ships from the 1970s to 80s, with most of his years spent on Xiangyanghong 10, China's largest research vessel built at that time. In 1980, Xiangyanghong 10 took part in China's first ICBM test—known as Project 580—near Nauru in the South Pacific, where he was in charge of weather forecast for retrieving the missile's black box. Four years after that, he and his ship travelled to King George Island in China's first Antarctic expedition, and spent a few months there building the Great Wall Station. I can tell that he has a mixed feeling towards his life on the sea, which was glorious on serving the cause but regretful to be absent from children's growth. Despite that, his adventures have still ignited my interest in ships and navy, and planted a seed of this mod since then.\n\nAs I'm getting busier than before on my work and family, I have no idea if Naval Rework can be continued in the future, so I'm looking to build a small team to keep this mod going. If you want to reach me, please refer to the discord link in workshop page."
