l_english:
 Naval_lore_category: "Naval Rework"
 Naval_lore_category_desc: "Alfred Mahan, the father of theory of Sea Power, wrote, \"Sea Power is largely, though by no means solely, a narrative of contests between nations, of mutual rivalries, of violence frequently culminating in war\". The 20th century witnessed the rise of naval powers, and the navy has been playing a vital role in global strategy.\n\nEver since the Second Naval Arms Race, navies of the world have been innovating and expanding their fleet. From wolfpacks beneath the sea to behemoths on the surface, modernized warships dominates every inch of the waters."
 add_never_built_blueprints: "Acquire Never-Built Blueprints"
 add_never_built_blueprints_desc: "Re-initiate the projects abandoned in the past."
 
 # Japan navy lore
 JAP_naval_lore: "History of Imperial Japanese Navy"
 naval_lore_title_1_jap: "§HLegacy of Tsushima, Imperial Japanese Navy: 1910-1925§!"
 naval_lore_desc_1_jap: "The Meiji Restoration has given Japan modern factories and imported machinery, and imagination of an Asian empire. By the Sino-Japanese War in 1894, Japan already possessed a respectable battle fleet, much of it foreign-built but increasingly handled by officers who understood that sea power would decide the nation's place in Asia. The victories over Qing China and Tsarist Russia confirmed that conviction. Tsushima, in particular, became more than a battle honor, but the founding memory of a navy that saw itself as the shield of the Empire and the arbiter of Japan's destiny in the western Pacific.\n\nThe years before the Weltkrieg were therefore a period of apprenticeship. The acquisition of Kongō, Japan's first capital ship with super-dreadnought firepower, marked the last great lesson drawn directly from British yards. Designed abroad yet built for Japanese requirements, she stood at the hinge between imitation and independence. The Fusō and Isé classes followed as products of domestic dreadnought construction, with Isé's improved turret arrangement showing that Japanese designers were no longer content merely to reproduce foreign practice. Naval thinkers such as Satō Tetsutarō had already argued that Japan's security depended on command of the seas around a defensive perimeter; now the dockyards were beginning to give that argument steel and armor.\n\nWhen the Weltkrieg broke out, Tokyo invoked the Anglo-Japanese Alliance and moved swiftly against Germany's scattered Pacific possessions. These operations reinforced the Navy's belief that the Empire's future would be decided across island chains and distant sea lanes. The occupation of Germany's Pacific territories expanded Japan's strategic horizon, while the absence of a major land campaign allowed naval expansion to retain political priority at home.\n\nIn 1917, the Naval General Staff gave this ambition its most famous form: the Eight-Eight Fleet. The plan called for eight modern battleships and eight battlecruisers, a force intended to meet any enemy fleet in the decisive battle that Japanese doctrine considered the climax of a Pacific war. The Nagato class, armed with eight 410mm guns, became the first great expression of this program, followed by two Tosa class in 1920 with a fifth turret. Advances in steam-turbine engineering allowed these ships to reach 26 knots, a speed that placed them among the most formidable capital ships of their day. Four Amagi-class battlecruisers, ordered in two pairs between 1920 and 1921, were designed to give the battle line the fast wing it required. Around them grew a supporting force of Kamikaze- and Mutsuki-class destroyers, intended to harry an approaching American fleet before the battle line delivered the final blow.\n\nA quieter revolution was also taking place above the fleet. The Commission on Naval Aeronautical Research, established in 1912, had overseen wartime experiments with converted seaplane carriers and helped cultivate a small but persistent body of aviation-minded officers. These efforts culminated in Hōshō, commissioned in 1922 as the world's first purpose-built aircraft carrier. She was small, experimental, and still subordinate to the battle fleet in doctrine, yet she gave Japan practical experience in carrier operations at a time when many navies continued to treat aviation as a useful auxiliary rather than a future arm of decision.\n\nThe settlement of 1919 did not immediately pacify the Pacific. Japan at first refused to relinquish the former German colonies it had occupied during the war, yielding only under Anglo-American pressure in the Tsingtao Accord of 1921. The episode deepened the Navy's suspicion that Japan's wartime gains could not be secured by diplomacy alone. Instead of retreating from competition, Tokyo pressed forward. Four Kii-class battleships were ordered in 1923, a project of such scale that Atago was diverted to carrier conversion as a budgetary compromise. Yet the pace of foreign design soon outran Japanese assumptions. By 1924, reports of more powerful American and German capital ships made Kii appear inadequate. The Navy Technical Department answered with the Aki class, also known as Battleship M, a radical design armed with twelve 460mm guns.\n\nThe answer was technically bold and financially impossible when the Depression of 1925 struck an economy already weakened by years of extraordinary naval expenditure. Through the early 1920s, nearly forty percent of the fiscal budget had been sunk into fleet expansion, feeding bitter resentment within the Army and alarming civilian authorities. Under the pressure of fiscal collapse, the Navy was forced to cancel the Aki class and abandon the unfinished Kii-class battleships Suruga and Ōmi. Kii and Owari were completed only after a four-year delay."
 naval_lore_title_2_jap: "§HBlooming Sakura, Imperial Japanese Navy: 1925-1936§!"
 naval_lore_desc_2_jap: "The budget crisis of 1925 did not destroy the Imperial Japanese Navy, but it forced the service to abandon the simple arithmetic of parity that Japan could no longer expect to match the Western powers ship for ship. German expansion in Asia, American strength across the Pacific, and the vulnerability of Japan's island perimeter demanded a different answer. The Navy therefore refined its defensive “Kantai Kessen” doctrine: an enemy fleet advancing westward would be worn down by submarines, fast battleships, cruisers, destroyers, and night torpedo attacks before the main battle line sought the climactic engagement.\n\nThis doctrine suited Japan's strategic geography, yet it also reflected necessity. By the late 1920s, the Combined Fleet was aging faster than the treasury could renew it. Kongō, the oldest of Japan's battleships, had already served for more than fifteen years, and plans for her full modernization were partially abandoned under financial pressure. The Navy Technical Department looked for a cheaper way to preserve striking power and command capability within the night battle force. The result was the B65-type large cruiser, conceived less as a substitute battlecruiser than as a practical command ship for night actions. Armed with six 356mm guns and drawing on proven technologies associated with Kongō, the design offered a compromise between ambition and affordability. Furutaka and Kako were ordered in 1929, followed shortly by the slightly improved Aoba and Kinugasa.\n\nWhere capital construction had become ruinously expensive, lighter forces promised tactical advantage at a price Japan could bear. Postwar destroyers and cruisers were growing larger, faster, and more heavily armed, a trend underscored by Germany's Type 1924 destroyers. Japan's answer was the Special-Type destroyer. Their six 127mm guns in three enclosed turrets gave them the firepower of small cruisers, while the Type 93 oxygen torpedo promised a reach and destructive effect few foreign navies could ignore. These ships embodied the Navy's search for asymmetric strength, though their high-speed hulls revealed serious stability problems. The defect was addressed through refits and through the more cautious design of the later Shiratsuyu class.\n\nAs the economy began to recover in the early 1930s, the National Diet became willing to fund limited naval renewal. The Ship Replenishment Plans, or Maru Keikaku, did not revive the vast building programs of the Eight-Eight era, but offered a more selective recovery. The 1931 program centered on four economical Tokachi-class cruisers, designed to balance cost and combat capability, together with the light carrier Ryūjō, whose construction ended a decade in which naval aviation had survived more through experiment than through sustained patronage. The 1934 program gave priority to four Monobe-class cruisers, improved Tokachi variants valued within the Navy for their versatility and affordability.\n\nBy the middle of the 1930s, the aircraft carrier was no longer merely a scouting platform in Japanese thinking. Exercises, foreign developments, and the accumulated experience of Hōshō and Ryūjō all suggested that air power might shape the battle before the great guns came into range. Japan responded in 1934 by laying down Sōryū, its first fleet carrier designed from the outset for operations with the main fleet. Together with the projected 1937 replenishment program, these measures indicate a Navy emerging from austerity with a clearer sense of proportion. The Imperial Japanese Navy of 1936 is no longer the navy of unlimited Eight-Eight ambition. It is leaner, more tactical, more conscious of finance, and increasingly determined to turn doctrine, night fighting, torpedoes, and aviation into the instruments of a renewed Pacific power."
 
 # German navy lore
 GER_naval_lore: "History of Imperial German Navy"
 naval_lore_title_1_ger: "§HHeil dir im Siegerkranz, Kaiserliche Marine: 1900-1922§!"
 naval_lore_desc_1_ger: "The Kaiserliche Marine entered the twentieth century as the most deliberate challenger to British command of the seas. Alfred von Tirpitz's Flottengesetze (fleet law) had tied industry, politics, and naval prestige into a single program, and the commissioning of HMS Dreadnought in 1906 only sharpened the contest. Germany's earliest dreadnoughts aged quickly in an era of violent technical change, yet the Hochseeflotte narrowed the gap before the war through the König-class battleships and a powerful squadron of heavily protected battlecruisers. By 1914, with four Bayern-class battleships and three Derfflinger-class battlecruisers already planned, Berlin had accepted that a European great power required a fleet able to threaten Britain's margin of safety.\n\nJutland in 1916 gave Germany a tactical success without strategic release. The Royal Navy's blockade remained in place, and the experience strengthened those who argued that surface power alone could not break Britain's grip, prompting General Ludendorff to press for the resumption of unrestricted submarine warfare in 1917. Kaiser Wilhelm II hesitated, aware of the diplomatic danger, and approval came only in late 1918, when the threat of American intervention had greatly diminished. At the same time, fresh naval expenditure continued. SMS Württemberg entered service in 1918, and four Mackensen-class battlecruisers followed across 1919 and 1920. War funds were also gathered for four L-20e battleships and three Ersatz-Yorck battlecruisers in the last few months of the war, a final wartime declaration that Germany intended to reopen its road to the wider world.\n\nBy summer 1919, the Entente's morale had collapsed under advancing German boots. France surrendered amid internal revolt, and the Treaty of Versailles closed the Western alliance. However, peace did not end naval anxiety. Britain, wounded but still afloat, extended the Grand Fleet in the face of German naval expansion, while Germany's own officers insisted that no blockade must ever again decide the fate of the Kaiserreich. With the Army demobilized and Ludendorff's influence declining, naval officers and shipbuilding interests pushed to preserve the wartime construction programs. After six months of bitter debate, the 1920 Flottengesetze passed, presenting new construction as a shield against future encirclement.\n\nThe program gave the Navy a postwar rhythm. In October 1921, as the final ship of the Preußen class, formerly the L-20e design, was laid down, the Navy received permission to begin two Scharnhorst-class battlecruisers, derived from the Ersatz-Yorck project, for construction between 1922 and 1925. The yards remained active and skilled labour stayed employed, but the solution was dangerous. Germany had avoided one form of postwar industrial dislocation by binding itself to another round of naval competition.\n\nThe Admiralty in London read the German program as a direct assault on the Two-Power Standard. Its answer was the N3 and G3 projects, approved for construction between 1922 and 1923, with 18-inch guns for the N3 battleships and 16-inch guns for the G3 battlecruisers. Their armor schemes and concentration of firepower promised to overmatch Germany's existing designs. The reaction in Berlin, Washington, and Tokyo was immediate. Tirpitz, still the symbol of German sea ambition, appealed to the Kaiser for one more effort. In autumn 1922, under Wilhelm II's influence, the Reichstag narrowly approved additional funds for five new battleships to counter nearing British threat."


 naval_lore_title_2_ger: "§HDeutschland über Alles, Kaiserliche Marine: 1922-1936§!"
 naval_lore_desc_2_ger: "By late 1923, Germany's first postwar battleship had entered service, followed by the Scharnhorst-class a year later, but Britain's N3 program forced a new escalation. Throughout 1923, ThyssenKrupp expanded the largest dockyards in preparation for Germany's answer: the Elsaß class, armed with eight 450mm guns. When construction began the following year, Germany became the third nation after Britain and the United States to field super-heavy dreadnoughts, a triumph of engineering that also revealed how far prestige had outrun prudence.\n\nHowever, the British Revolution of 1924 changed the balance at once. Britain's participation in the naval race ended abruptly, and Germany moved to secure several former British possessions in Africa and Asia as colonial authorities sought protection from disorder and anti-colonial unrest. The new colonial empire stretched German shipping, administration, and naval logistics across distances the prewar Hochseeflotte had never been built to police. Colonial revenue promised wealth, yet the 1924 Flottengesetze met caution even within conservative circles, who complained that five Elsaß-class battleships appear overwhelmingly excessive. Only after the Navy conceded a reduction to two ships, with later battleships and cruisers delayed, did the measure pass.\n\nThe boom created by postwar reconstruction could not conceal the burden of the late-1920s dreadnought programs. Funds promised in 1924 did not arrive until 1926, and even then in reduced form. Of the four Deutschland-class battleships, an improved variant of the Preußen design, two were cancelled. The Schlieffen and Steinmetz, battlecruisers intended for the Ostasienflotte, were redesigned around a smaller 380mm battery. While these ships moved slowly toward completion, the Navy turned to cheaper cruisers for colonial service. The revival of the armoured cruiser was typical of the period: not a true battlecruiser, but a long-legged and economical capital ship for distant stations, able to show the flag and overawe local threats without draining the battle fleet.\n\nGermany's devotion to heavy gun platforms came at a doctrinal cost. By 1932, when the Weser-class carriers finally entered service, the Navy still regarded them mainly as aerial reconnaissance vessels replacing the retired Zeppelins. The two Graf Zeppelin-class fleet carriers, completed three years later under pressure from the Far East Command, suggested a wider role for naval aviation, though Berlin remained cautious. The failures and delays of the post-1925 battleship program encouraged reformist officers to call for a more flexible fleet, but the old battle line retained its institutional weight.\n\nThe change is most visible in the contrast between home waters and East Asia. From the Blücher class of 1935, the Hochseeflotte has only tentatively moved toward fast battleships, attempting to correct a fleet structure dominated by powerful but slow squadrons. The Ostasienflotte, rebuilt almost from scratch, has become more experimental: raiding tactics, long-range cruising, and carrier-centered operations have all found advocates there. Whether those lessons will reshape Berlin's thinking remains uncertain.\n\nIn 1936, the Kaiserliche Marine is formidable, well funded, and globally present, yet it is also overextended, divided between old prestige and new requirements, and still searching for the doctrine suited to the empire it has acquired."
 
 ENG_naval_lore: "History of British Royal/Republican Navy"
 naval_lore_title_1_eng: "§HRule the Waves, Royal Navy: 1900-1925§!"
 naval_lore_desc_1_eng: "For more than a century the Royal Navy had been the visible architecture of British power. It guarded the trade routes, held the empire together, and set the technical standard by which other fleets measured themselves. By the opening years of the twentieth century, however, German ambition had turned naval supremacy from an inheritance into a contest. The Admiralty answered with money, design talent, and a willingness to discard its own ships before an enemy could make them obsolete.\n\nHMS Dreadnought, launched in 1905, changed the language of naval warfare with her uniform heavy battery and centralized fire control. Other powers hurried to imitate her, while Britain pressed ahead. The Orion class introduced the superfiring arrangement that shaped later British battleships, and the King George V and Iron Duke classes carried the same logic forward. Admiral Sir John Fisher's battlecruiser concept, beginning with HMS Invincible, gave the fleet speed and reach, though at a price that Jutland would later expose. By 1912, the Queen Elizabeth class offered a powerful blend of speed, armor, and 15-inch guns, while the slower Revenge class preserved numerical strength, with two units later refitted as Renown-class battlecruisers.\n\nAt the outbreak of the Weltkrieg, the Two-Power Standard still gave Britain global superiority. Early encounters with the German fleet were indecisive, and Jutland in 1916 left the Royal Navy in control of the sea without sparing it from painful lessons. British battlecruiser losses forced a hard reappraisal of protection, magazine discipline, and the Admiral-class program. The blockade remained Britain's strongest weapon, but the war's wider course darkened. Russia collapsed in 1917, French casaulties surged, and the empire entered 1919 exhausted despite the preservation of its colonial position in the truce with Germany.\n\nGermany's postwar naval building made complacency impossible. The Director of Naval Construction responded with a unified layout for the N3 battleships and G3 battlecruisers, concentrating armor and armament around compact citadels and mounting 18-inch guns in the N3 and 16-inch guns in the G3. HMS Magnificent and HMS Majestic, the first N3 ships, were laid down in mid-1922, followed by the Nelson-class in 1923. These ships were meant to preserve Britain's qualitative lead, while the Blenheim-class, four of which were ordered in 1923, offered a cheaper large-cruiser supplement to the battlecruiser force.\n\nNaval aviation advanced in parallel, though still under the shadow of the battle fleet. HMS Argus had given Britain practical carrier experience in 1918, and in 1924 plans began to convert the Courageous-class battlecruisers into aircraft carriers. On paper, the Royal Navy remained the most sophisticated fleet in the world. In practice, it was carrying the weight of a strained economy, idle yards, expensive new designs, and a society increasingly unwilling to pay the price of imperial command. In the year of 1924, the nightmare turned real."
 naval_lore_title_2_can: "§HDusk of an Empire, Royal Navy: 1925-1936§!"
 naval_lore_desc_2_can: "By 1924, the British Empire was trapped in an economic crisis that no appeal to past glory could dispel. Recession, debt, and shrinking markets forced Austen Chamberlain's National Government into severe austerity. The fiscal bill cut military pay and halted naval expansion, throwing shipyards into idleness and leaving thousands of skilled workers without wages. For a navy built on tradition and service discipline, the blow was more than financial. It struck at the compact between the state and the men who kept the empire's sea roads open.\n\nThe result came quickly. On 18 May 1924, the crews of HMS Hood and HMS Repulse, returning from a tour of the Dominions, mutinied after learning of the pay cuts. Attempts to suppress the unrest only widened it. Strikes spread, syndicalist influence grew, and the Navy began purging its own ranks even as the monarchy's position collapsed ashore. By Christmas Eve 1925, royalist forces had lost control of Scotland and Wales, while French commandos and republican insurgents overran much of England.\n\nThe evacuation from Plymouth and Southampton was desperate rather than planned. Nobles, troops, officials, and civilians were carried toward Canada in whatever order could be managed. Unfinished ships were scuttled, sabotaged, or abandoned. Only HMS Magnificent escaped intact, with others, Majestic (65% completed), Venerable (10% completed), and Victorious (just laid), falling into republican hands. HMS Nelson, the only launched postwar battleship, defected while fitting out at Clydebank.\n\nWithout direct order from London, Rear Admiral David Anderson, Commander-in-Chief of the China Station, suppressed mutiny at Singapore and ordered an evacuation to Australia before the approaching German fleet could trap him. His ships were joined with Australian naval forces and other British overseas units in the Pacific, later forming the Royal Australasian Navy. What had once been a single imperial system now survived as scattered commands bound together by habit, loyalty, and fear.\n\nCanada inherited the remnants of British sea power overnight, but the inheritance was deceptive. The exiled Royal Navy had ships and traditions, but it lacked yards, money, and a coherent command structure to withstand itself. The completion of HMS Magnificent in Halifax absorbed scarce funds, and no new major ships entered service until the four Moncton-class cruisers were commissioned in 1933. The exsitence of the Grand Fleet has crippled Canada's fragile economy, forcing Canadian officials to overrule the Admiralty and decommission ships while leaving the rest unattended.\n\nFor now, the Royal Navy still carries the memory of a century of command, but memory cannot patrol the Seven Seas. Its future depends on whether the Commonwealth can be reunited and whether Canada can turn imperial remnants into a modern force. Until then, the white ensign flies over a navy that is proud, wounded, and perilously short of time."
 naval_lore_title_2_eng: "§HFlying Red Flag, Republican Navy: 1925-1936§!"
 naval_lore_desc_2_eng: "The Republican Navy was born from the same catastrophe that sent the old Royal Navy into exile. Economic crisis, the pay mutinies of 18 May 1924, nationwide strikes, and the collapse of royal authority tore the fleet apart before any new doctrine could be written. By Christmas Eve 1925, as republican forces seized much of England and royalist evacuation began from the southern ports, the new regime inherited ships, dockyards, unfinished hulls, and a service whose experienced officers had either fled, been purged, or chosen their politics with care.\n\nThe first years were therefore years of salvage. The Republican Navy possessed great material potential but little settled organization. Obsolete battleships were kept in commission because nothing better was immediately available. The Naval Construction Committee, headed by Albert V. Alexander, renovated the Renown- and Courageous-class battlecruisers and worked to complete unfinished ships that had escaped royalist sabotage. The Nelson-class and Blenheim-class battlecruisers took years to finish, and their slow progress revealed the difficulty of turning revolutionary possession into naval power.\n\nStability after 1932 gave the service room to think beyond survival. Younger officers, less attached to the old rituals of the battle line, gave naval aviation unusual influence. The Republican Aviation School, established in 1930 on the foundations of the former Royal Aero Club, trained the personnel needed for a different kind of fleet. In 1934, RNS Rebecca entered service as the world's largest carrier, converted from the unfinished hull of HMS Majestic. Two Republic-class fleet carriers followed in 1935.\n\nHowever, the surface fleet still showed the marks of transition. Prewar battleships such as RNS Leveller, formerly HMS Queen Elizabeth, formed the backbone of the line, joined in 1933 by two outdated Nelson-class battlecruisers. The Navy understood their limitations but had not yet settled the future shape of its battle fleet. The Union class, ordered in 1935, represented one answer: a fast battleship armed with nine 18-inch guns restored from the N3 project and capable of 30 knots, though her speed came at the cost of thinner protection, a familiar echo of Fisher's old doctrine. The later Bondfield class corrected the imbalance with improved armour and 16-inch guns. Modern Measureless-class cruisers and new destroyer squadrons were planned to support both lines of development.\n\nThe Republican Navy has become one of the world's leading naval forces, though its strength remains new and partly untested. It controls the greatest dockyard base in Europe, possesses the most aggressive carrier program in the Atlantic, and serves a state that sees naval power as a weapon of revolution as well as defence. Whether carriers, fast ships, and political zeal can replace the accumulated experience of the old Royal Navy remains one of the central questions of the coming war."
 
 USA_naval_lore: "History of the United States Navy"
 naval_lore_title_1_usa: "§HSteady as She Goes, United States Navy: 1905-1920§!"
 naval_lore_desc_1_usa: "Alfred Thayer Mahan's The Influence of Sea Power upon History, published in 1890, gave American expansion a naval language. It argued that commerce, bases, and battle fleets were not ornaments of power but its foundations. Under President Theodore Roosevelt, that language became policy. The lessons of the Russo-Japanese War, the shock of HMS Dreadnought, and the spectacle of the Great White Fleet's 1907 world cruise all reinforced the idea that the United States could no longer remain a continental republic with a coastal navy.\n\nBy 1914, the United States had commissioned more than ten dreadnoughts in only eight years. The Navy's strength rested increasingly on the Standard-Type battleship concept: ships of similar speed, tactical radius, and handling qualities, allowing the battle line to manoeuver as a coherent whole. The Nevada- and Pennsylvania-class embodied this approach, introducing triple turrets and all-or-nothing armor protection. The system lacked the glamour of Fisher's battlecruisers or Germany's raiding squadrons, but it suited American industry and the General Board's preference for steady, controlled improvement.\n\nNeutrality during the Weltkrieg brought profit as well as uncertainty. American firms sold arms and material to both sides, and the economic boom helped sustain naval construction. At the same time, the cost of the fleet alarmed Congress. Senator Benjamin Tillman's proposal for a single Maximum Battleship was an attempt, half practical and half rhetorical, to end the arms race by building the largest ship possible. The argument did not prevail. President Woodrow Wilson signed the Naval Act of 1916, the Big Navy Act, authorizing ten battleships and six battlecruisers in pursuit of what he called, 'incomparably, the greatest Navy in the world.'\n\nWitnessing unprecedented naval battles in Europe, debate emerged inside the Navy. The General Board wanted speed to match foreign developments, while Secretary Josephus Daniels preferred incremental development and political caution. The Tennessee-class showed that conservatism, while the Colorado class, armed with 16-inch guns but still rooted in the Standard-Type tradition, brought the era to an uneasy close. Postwar planning shifted toward the South Dakota-class battleships and Lexington-class battlecruisers, ships intended to match foreign fleets with 23-knot battleships and 33-knot battlecruisers. However, President McAdoo's budget cuts slowed the program in 1920, leaving the United States Navy with vast potential, unfinished hulls, and a doctrine still uncertain about speed, aviation, and the cost of command in two oceans."
 
 naval_lore_title_2_usa: "§HGod Bless America, United States Navy: 1920-1936§!"
 naval_lore_desc_2_usa: "As the South Dakota-class battleships neared completion, reports of British and German super-dreadnoughts armed with 18-inch guns reached Washington. The Navy regarded the news as a direct threat to the value of its newest designs. After bitter Congressional debate, an emergency amendment passed in December 1921 authorizing four Louisiana-class battleships, massive ships carrying ten 18-inch guns in four turrets. To make room for them, one South Dakota and two Lexingtons were waived, while three additional hulls were converted into aircraft carriers. When Louisiana was laid down in November 1923, the United States became the second nation in the world to begin construction of super-heavy battleships.\n\nThe timing could hardly have been worse. Financial markets had already weakened through 1924 as tension in Britain shook confidence, and the British Revolution turned unease into panic. On 20 April 1925, the New York Stock Exchange suffered the worst crash in its history. Excessive consumer debt, speculative banking, and industrial overextension were exposed at once. The Great Depression devastated American industry and forced the Hoover administration into severe austerity. Naval ambition, like so much else, was cut down by the collapse.\n\nOnly two Louisiana-class ships were continued, and they were completed by 1929 with some systems still unfinished, while the remaining projects from the 1916 Naval Act were abandoned. The Navy, haunted by the crisis, turned to what could be saved from existing hulls. Carrier conversions accelerated, including USS Massachusetts, the sixth member of the South Dakota class, and two Lexington-class battlecruisers, USS Ranger and USS Constellation. These ships encouraged interest in naval aviation, yet doctrine remained divided. Officially, the battleship still stood at the centre of the fleet; in practice, officers were quietly learning that the carrier could scout, strike, and perhaps one day decide.\n\nThe 1930s brought the completion of several long-delayed pre-Depression projects. Six Northampton-class cruisers and two Pensacola-class cruisers entered service alongside the huge Louisianas, giving the fleet some modern strength in spite of austerity. The larger dream of an unquestioned two-ocean navy, however, has faded.\n\nAs Germany and Japan continue to expand, Washington is consumed by economic distress and political turmoil in 1936. The United States Navy remains powerful by any ordinary measure, but it is a fleet caught between old reputation and the urgent need to adapt before the next crisis arrives."
 
 FRA_naval_lore: "History of French Navy"
 naval_lore_title_1_fra: "§HHonneur et Patrie, French National Navy: 1900-1920§!"
 naval_lore_desc_1_fra: "The French Navy is one of Europe's oldest maritime institutions, with roots reaching back before its formal organization in the seventeenth century. It fought through the age of sail, the Napoleonic Wars, the colonial century, and the technological revolutions that followed. French yards and engineers gave the world landmark innovations, including the ironclad and the mechanically propelled submarine. Yet by the opening of the twentieth century, innovation had not translated into strategic weight. The great naval race between Britain and Germany pushed France to the margins, and the Marine Nationale entered the new century with only a modest force of pre-dreadnoughts.\n\nDreadnought construction came late. Courbet entered service in 1913 and Bretagne in 1916, but the five Normandie-class ships ordered in 1913, notable for their quadruple turrets, were largely suspended by the demands of the Weltkrieg. France fought for survival on land, and the Navy's industrial claims could rarely compete with the needs of the front. Under prewar understandings, Britain concentrated on the North Sea while France carried much of the Mediterranean burden, watching the Austro-Hungarian Navy and securing Allied communications.\n\nItaly's entry on the Allied side in May 1915 allowed the French fleet to move forward to Brindisi and Corfu. From those bases it supported operations across the Adriatic and eastern Mediterranean, including the 1916 amphibious intervention at Athens that forced the pro-German Greek government to join the Entente. French destroyer squadrons also became essential in the struggle against Germany's submarine campaign, patrolling sea lanes and escorting convoys. The Navy did not fight a decisive fleet action, but it performed the less celebrated work by which armies are supplied and coalitions kept alive.\n\nThe Treaty of Versailles in 1919 found France armstice in name but broken in substance. Anarcho-syndicalist riots spread across much of the country, while Germany secretly provided arms and money to deepen the disorder, repeating in altered form the methods it had used in Russia. The leaders of the CGT, the General Confederation of Labour and the most influential socialist force in France, sought a national negotiation with the Provisional Government over workers' treatment. They also tried to restrain the radical Jacobins, who called for a violent Bolshevik-style revolution.\n\nModeration failed to hold before the establishment lost patience, the left fragmented, and the crisis escalated beyond negotiation. The French Navy, already strained by war, suspended construction, and divided loyalties, entered the French Civil War as part of a nation whose political hull had split beneath the waterline."

 naval_lore_title_2_nfa: "§HNotre Mer, French National Navy: 1920-1936§!"
 naval_lore_desc_2_nfa: "As conditions on the mainland became untenable, the French government and military high command chose exile over surrender. They expected the newly created Federation of Communes of France either to collapse under its own contradictions or to be crushed by the German Empire. Neither occurred. Germany and the members of Mitteleuropa recognized the Commune as the legitimate successor to the Republic, leaving the exiles in North Africa with only memory, flags, and a claim that the world increasingly ignored.\n\nThe government-in-exile reached North Africa in June 1920, escorted by loyal elements of the Mediterranean Fleet. Its leaders spoke of return, but the colonies lacked the industry and manpower required to build a modern army, let alone a major fleet. In the early 1920s, the National Navy's principal strength consisted of two Courbets, two Bretagnes, and a handful of pre-dreadnoughts. Ferryville and Dakar could maintain light ships, but the larger vessels aged rapidly in exile.\n\nConfrontations off Corsica forced the National Navy to prepare for the possibility of a future return to the mainland. It could not build what it needed at home, so it watched for changes in European politics. The collapse of the British Isles and the loosening of arms-export restrictions opened a narrow path. The Two Sicilies, with busy shipyards and a willingness to sell to former Entente powers, became the first major supplier. Six 17,500-ton Pothau-class cruisers were ordered, though only Pothau herself was completed because of the exiles' poor finances. Laid down at Naples in 1927, she carried two triple 330mm turrets forward of the bridge and entered service in 1931.\n\nStrategic calculation also brought Austria-Hungary into the exile navy's story. Vienna allowed one of its great contractors, Stabilimento Tecnico Triestino, to export a pair of battleships in exchange for French capital assets in Italy and the Balkans. Union Sacrée and France, laid down in 1933, were armed with nine 380mm guns and drew heavily on the Austrian Hunyadi design. Purchasing them nearly exhausted the Republic's foreign exchange reserves, but they gave the exiles something no speech could provide, a battle line around which a return might be imagined.\n\nEven so, the National Navy cannot defeat the syndicalists alone. Since the fall of Britain, the remnants of the Entente Cordiale have been pushed to the margins of world politics. The return to the motherland appears distant, perhaps impossible. Yet Europe is tightening again. If the final struggle comes, the National Navy intends to be more than a relic of defeat. It intends to be the spearhead of the Republic."
 naval_lore_title_2_fra: "§HLe Nouveau Phare, French People's Liberation Navy: 1920-1936§!"
 naval_lore_desc_2_fra: "The French Civil War divided the Navy as thoroughly as it divided the nation. There were engagements between nationalist and syndicalist units, but most ships remained in port, immobilized by fuel shortages, uncertain crews, and political confusion. When the fighting ended, the vessels that had remained in mainland France became the backbone of the Marine de libération du Peuple, the French People's Liberation Navy.\n\nThe new Communal Navy was based mainly at Brest and Toulon. At first it was a defensive service, charged with patrolling territorial waters and preventing landings on the French coast rather than projecting influence abroad. It inherited insurgent ships and attempted to finish parts of the old Normandie class during the 1920s. The design had been overtaken by the renewed naval race, and the Commune's limited resources allowed only two ships to be completed: one as a battleship and the other as the aircraft carrier Eugène Pottier.\n\nThe establishment of the Union of Britain changed French thinking. With a revolutionary ally across the Channel, the Navy began to turn from coastal defence toward offensive war against the German Empire's weakest point: the sea lanes linking Germany to the colonies that fed its war machine. Logistics raiding became the centre of doctrine. In 1927, France and Socialist Italy launched modern cruiser programs and proposed two types of raider cruisers, the Rennes class and the better-protected Lyon class. Grouped with large destroyers such as the Communard class, these ships were intended to ambush Reichspakt convoys in the Atlantic. The memory of German submarine warfare in the 1910s also drove a strong submarine program, represented above all by the dangerous Émeraude class.\n\nFrench renewal in the 1930s followed the broader modernization of the Third Internationale, though on a smaller scale than Britain's. In many respects, the alliance's strategy repeated the old Anglo-French division of labour from the Weltkrieg, making Austrian and German squadrons in the Mediterranean key enemies of the French Navy. To renew its aging capital ships, the Commune ordered two Internationale-class battleships in 1932 for the Mediterranean Fleet. They were reinforced in 1935 by Le Fantasque- and Verdun-class destroyers. Four Charles Fourier-class large cruisers, laid down in late 1933, were assigned to the Atlantic Fleet for hunting isolated scouts and merchantmen of the Reichspakt.\n\nFor many years the Navy remained a smaller branch of the Communal armed forces, overshadowed by the army and by the political struggle at home. By 1936, however, it has become more coherent, more aggressive, and more closely tied to the strategy of the Internationale. The red Gallic Rooster does not yet command the seas, but it has learned where to strike."
 
 
 RUS_naval_lore: "History of Russian Navy"
 naval_lore_title_1_rus: "§HElegy of the Double Eagle, Imperial Russian Navy: 1900-1917§!"
 naval_lore_desc_1_rus: "Formally established in 1696 under Peter the Great, the Imperial Russian Navy grew from a small regional force into one of the great fleets of Europe. By the early nineteenth century it stood behind only Britain and France in size, and it carried the prestige of an empire that faced both the Baltic and the Black Sea. Yet Russia's industrial and technical development lagged during the age of steam. The humiliation at Tsushima in the Russo-Japanese War shattered the old confidence and made Russia the only European power defeated by an Asian state in a full-scale modern war. After 1905, the Navy's centre of gravity shifted away from the Far East and back to the Baltic, where the defence of Petrograd against Germany became its major concern.\n\nA naval expansion program placed before the Duma in 1907 was rejected, but the Bosnian Crisis forced reconsideration. The German-Austrian alignment and Vienna's pressure on Serbia made Russian leaders more willing to rebuild. Four Gangut-class battleships were laid down in 1909 to replace obsolete pre-dreadnoughts and guard the Gulf of Finland. They entered service before the war, though their turrets and fire-control systems were only fully ready by mid-1915. In the Black Sea, three Imperatritsa Mariya-class battleships were built in response to worsening relations with the Ottoman Empire.\n\nRussian rearmament depended heavily on foreign firms. Ships, machinery, and components, including work associated with the cruiser Rurik, were ordered abroad. The Weltkrieg exposed the weakness of that dependence. Equipment in Germany was confiscated after hostilities began, while deliveries from Britain slowed or were diverted to the Western Allies. Russian yards could build large ships, but the industrial system behind them remained fragile.\n\nDuring the war, the Navy fought on two separated fronts. In the Baltic, where the German fleet was larger and more modern, Russian forces adopted a defensive posture, laying mines and striking at convoys when opportunity allowed. In the Black Sea, the balance was more favourable. From Sevastopol, Admirals Andrei Eberhart and Alexander Kolchak used Russia's stronger fleet to inflict heavy losses on the Ottoman Navy and secure local command of the sea. The fleet's greatest disaster came not in battle but in harbor, when Imperatritsa Mariya exploded at Sevastopol on 7 October 1916.\n\nBy 1916, Russia could still launch great land operations such as the Brusilov Offensive, but the state was nearing exhaustion. Famine, casualties, and military failure eroded public faith in the Tsar. Protests spread through the capital region, leading to the collapse of the autocracy in the February Revolution of 1917. The Imperial Russian Navy, already strained by war and divided by politics, went down with the regime it had served."
 naval_lore_title_2_rus: "§HAurora over the North, Soviet/Russian Navy: 1917-1936§!"
 naval_lore_desc_2_rus: "The Provisional Government inherited a vast but crumbling military machine and lost authority almost as soon as it chose to continue the war on the Entente side. Germany understood that Russia still possessed dangerous size even in disorder, and in 1917 launched major offensives in Eastern Europe and the Gulf of Riga to force a final decision on the eastern front. At sea, as ashore, Russia's weakness was no longer material alone. It was political.\n\nThe hopes of February had faded by the closing weeks of 1917. The Provisional Government's hesitation, the Petrograd Soviet's influence, and constant street violence left the capital paralysed. General Lavr Kornilov's attempted March on Petrograd in August showed that parts of the Army were willing to restore order by force. Alexander Kerensky instead freed Bolshevik elements to defend the city, a decision that armed his enemies as much as his supporters.\n\nRumors that Germany had aided Vladimir Lenin's return did little to stop communism spreading among workers and soldiers. The hatred between enlisted men and officers, workers and authorities, finally erupted in the October Revolution and the brutal Russian Civil War. Most sailors sided with the Bolsheviks, but fuel shortages kept their ships in port. The Navy became less a manoeuvering fleet than a collection of armed symbols, useful to whichever faction controlled the harbor.\n\nThe anti-Bolshevik forces, usually called the Whites, were divided and at first weaker than the Reds, who held key industrial regions. After Lenin's assassination, Germany began sending aid and personnel to the Whites out of fear that Bolshevik revolution would spread westward, which it has shifted the balance. In 1920, after the siege of Moscow, the victorious White Army signed the Treaty of Minsk with Germany, re-ratifying Brest-Litovsk and ending the three-year civil war.\n\nThe price was severe. The former western borderlands of the Empire became independent and entered Germany's Reichspakt. With Sevastopol lost to Germany, the new Ukrainian state inherited much of the former Black Sea Fleet, including Imperatritsa Mariya- and Evstafi-class battleships. A few destroyers were returned to the Russian Republic as a gesture of friendship, but Russia's naval position had been cut down sharply.\n\nThe 1920s were a decade of contraction. Obsolete ships were scrapped or sold, though the Navy managed to complete several vessels against the odds. The Svetlana-class cruisers, inherited from Imperial Russia and around 90 percent complete when work stopped in 1917, finally entered service. In the late 1920s, strategists led by Admiral Alexander Kolchak accepted the need for an asymmetric force in the Baltic. Financial weakness slowed the plan throughout the 1930s, producing only a handful of cruisers and destroyers for the Baltic and Black Sea directions.\n\nNowadays, the Russian Navy still maintains a meaningful presence in the Baltic and Black Sea, but it has few ships in the Barents or the Pacific. It remains a navy of recovery, carrying imperial memories, republican uncertainty, and a long road back to great-power status."
 
 AUS_naval_lore: "History of Austro-Hungarian Navy"
 naval_lore_title_1_aus: "§HBattle for the Adriatic, k.u.k. Kriegsmarine: 1900-1920§!"
 naval_lore_desc_1_aus: "The Kaiserliche und königliche Kriegsmarine was the maritime arm of a land empire, and that fact shaped both its ambitions and its limits. Formally established in the eighteenth century, it had a long rivalry with the Italian navy and had fought through the wars of Italian independence. Its world was narrower than that of Britain or Germany, but within the Adriatic the stakes were immediate: bases, coastlines, prestige, and the security of the Habsburg monarchy's southern flank.\n\nWhen the dreadnought race transformed naval construction, Austria-Hungary and Italy entered their own contest for mastery of the Adriatic. After HMS Dreadnought demonstrated the future of the battleship, Austrian naval architects pressed the War Ministry to approve the Tegetthoff-class. Many politicians were indifferent to naval expansion, but Archduke Franz Ferdinand became an important supporter. For him, as for the Navy's officers at Pola, a modern fleet was both a military necessity and a symbol that the Empire could still act as a great power.\n\nThe fragile peace of Europe ended with the shots at Sarajevo. Franz Ferdinand's body was brought home aboard SMS Viribus Unitis, and the Empire moved toward confrontation with Serbia, whose intelligence services were believed to have been involved in the assassination. The July Crisis followed. Russia's warning was ignored, and Austria-Hungary began shelling Belgrade on 28 July 1914, marking the beginning of the Weltkrieg.\n\nFor much of the war, the Austrian surface fleet remained concentrated at Pola, venturing out for limited operations and supporting land offensives with shore bombardment. The submarine campaign in the Mediterranean was more effective, forcing the Entente to maintain the Otranto Barrage. In 1917, Captain Miklós Horthy led a successful assault on the barrage. His second attempt in June 1918 ended in disaster after the fleet was sighted by an Italian MAS boat, leading to the sinking of SMS Szent István. The episode showed both the courage and the vulnerability of a fleet trapped in narrow waters.\n\nIn the final days of the war, the Italian government sought a separate understanding with Austria by offering territory and assets, including part of its fleet. Once revealed, the proposal provoked public fury in a country already exhausted by casualties and defeat. Italy slid into anarchy before any formal settlement could be reached with the Central Powers. Austria-Hungary then moved to eliminate the Italian naval threat more directly, organizing a frogman attack on Italian naval bases that crippled Conte di Cavour and Giulio Cesare. Both dreadnoughts were later judged beyond repair and written off by Italian authorities after the civil war.\n\nThe Weltkrieg exposed the cultural, class, and ideological divisions of the Habsburg state. In the first postwar years, Austria struggled to suppress unrest and restore order in military-occupied zones in Northern Italy and Ukraine. Naval modernization was delayed, and only one Admiral Njegovan-class cruiser, an improved Helgoland-type, was laid down in 1919. As the Second Naval Arms Race gathered speed elsewhere, the Austro-Hungarian Navy drifted at the edge of events. It was still useful in the Adriatic, but no longer a central actor in global naval competition."
 naval_lore_title_2_aus: "§HA.E.I.O.U, k.u.k. Kriegsmarine: 1920-1936§!"
 naval_lore_desc_2_aus: "As the immediate tensions of the early 1920s eased, Kaiser Karl attempted to reform the multinational empire into a state capable of surviving the twentieth century. In following the path once associated with Franz Ferdinand, he launched a series of large federal reforms. Resistance from the Hungarian nobility and autonomy movements within Cisleithania slowed the project, and the Navy had to plan within the familiar limits of Habsburg politics: many crowns, many parliaments, and never enough money.\n\nThe Kriegsmarine therefore stayed outside the heated naval race that consumed the Atlantic and Pacific powers. Its geography argued for restraint that large ships were difficult to justify in the confined waters along the Austrian and Croatian coasts, where mines, submarines, destroyers, and shore-based forces could be decisive. The Navy concentrated on screens and undersea craft. Eight Dragoner-class destroyers, products of the Ersatz-Huszár project and the postwar rearmament program, were ordered in 1922.\n\nThe battle fleet could not be ignored entirely. Austria-Hungary still possessed only three old dreadnoughts, and the question of replacement had been alive since before the war. In 1914, at the request of Admiral Anton Haus, Commander-in-Chief of the Navy, the government had approved four battleships for the 1915-1918 naval program. Designed as the Ersatz-Monarch and later known as the Hunyadi class, their construction was suspended during the war. They came close to cancellation, but Haus opposed scrapping them, and in February 1915 a compromise allowed work to resume after the war. Completed in 1925, they originally carried ten 350mm guns and were refitted with eight 380mm guns in 1930.\n\nFinance again imposed its verdict. The Hungarian parliament refused to pay its share of the naval budget, forcing the Navy toward cheaper heavy-ship designs. The Schwarzenberg-class, based broadly on Hunyadi, was weaker but faster and mounted ten 350mm guns in four turrets. Two ships were completed in 1933, while funding for another pair began only in late 1934. They were compromises in steel, reflecting the Navy's need for credible strength and the monarchy's chronic inability to agree on the price.\n\nThe growing strength of the Communal Navy in the Mediterranean revived fears of blockade. To meet that threat, Austria ordered four Meteor-class destroyers and a pair of Custozza-class cruisers during the 1930s. A new submarine force, built with German technology, added a quieter coastal weapon. The U-120 class was designed for shallow operations along the Austrian coast, where stealth and local knowledge mattered more than oceanic range.\n\nAs Europe is again moving toward a German-French confrontation, Austria-Hungary watches with old enemies gathering strength around it. The Kriegsmarine is often neglected in imperial politics, but neglect has not made it irrelevant. It remains the shield of the Adriatic, a modest fleet by world standards, yet one whose ships may decide whether the Habsburg coast remains open in the next war."
 
 
