l_english:
 # Rules
 RULE_AI_SHIP_DESIGN_STYLE: "AI Ship Design Style"
 RULE_OPTION_HISTORICAL: "Historical"
 RULE_OPTION_EXPERT: "Expert"
 RULE_AI_SHIP_DESIGN_STYLE_HISTORICAL_DESC: "AI will design historical ships with reasonable modules.\n\n§CThis is the old and default naval rework style.§!"
 RULE_AI_SHIP_DESIGN_STYLE_EXPERT_DESC: "AI will design ships based on efficiency and produce meta ships.\n\nThis will §Rmake the naval battle more intense§! and §Rbreak role play elements in this mod§!. §YRecommended for players who want challenges§!."
 RULE_ALLOW_AI_TECH_AUTO_UNLOCK: "Allow AI Auto Research"
 RULE_ALLOW_AI_TECH_AUTO_UNLOCK_FREE_DESC: "AI §Gwill automatically unlock§! a group of naval technologies in the run.\n\nThis option contains §RAI cheating§! that will §Yadvance unlocking certain techs§! if player chooses to §Crush future techs in either normal or cheating way§! (only activated when the advance is over 6 months)."
 RULE_ALLOW_AI_TECH_AUTO_UNLOCK_BLOCKED_DESC: "AI §Rwill not automatically unlock§! naval technologies in the run.\n\nThis will §Ychange§! AI's behavior with a §Ybalanced tendency§! to §Ypick different techs§!, but unavoidably making its naval research §Rslower§! than player's §Cdedicated naval run§!, and may §Raffect AI's research in other fields§!."
 RULE_SHIPYARD_OUTPUT_BOOST_PLAYER: "Player Shipyard Output Boost"
 RULE_SHIPYARD_OUTPUT_BOOST_AI: "AI Shipyard Output Boost"
 RULE_OPTION_BUFF_60: "Full"
 RULE_OPTION_BUFF_30: "Half"
 RULE_SHIPYARD_OUTPUT_BOOST_BUFF_60_DESC: "Shipyard output is 4 IC per day, §G60% faster§! than vanilla."
 RULE_SHIPYARD_OUTPUT_BOOST_BUFF_30_DESC: "Shipyard output is 3.25 IC per day, §G30% faster§! than vanilla."
 RULE_SHIPYARD_OUTPUT_BOOST_BLOCKED_DESC: "Shipyard output is 2.5 IC per day, the same as vanilla."
 RULE_AI_NAVAL_MANAGEMENT: "Enable VNR Naval AI"
 RULE_AI_NAVAL_MANAGEMENT_FREE_DESC: "§GEnable§! naval management AI designed for each specific major country in vanilla environment.\n\nThis option is designed for §YHistorical Mode§! to make AI majors act §Yhistorically and competively§! in a §Chistorical WWII scenario§!, by making AI simulate well-known naval strategies such as §CUnrestricted Submarine Warfare§! and §CIsland Hopping§! in real history.\n\n§RThis option is not recommended for the followings:§!\n£white_dot Alt-history mods (even with compatch)\n£white_dot State/Region mods with changes about seas and oceans\n£white_dot Non-default WWII scenarios (random path/alt-history, anything not leading to Axis vs Allies)"
 RULE_AI_NAVAL_MANAGEMENT_BLOCKED_DESC: "§RDisable§! naval management AI designed for each specific major country in vanilla environment.\n\n§YUse AI from base game or from other mods you play along with VNR.§!"
 RULE_AI_AIR_DESIGN: "Enable Improved AI Air Templates"
 RULE_AI_AIR_DESIGN_FREE_DESC: "§GEnable§! improved CV plane designs for AI countries.\n\n§RThis option is not recommended for mods modifying air techs and plane designer.§!"
 RULE_AI_AIR_DESIGN_BLOCKED_DESC: "§RDisable§! improved CV plane designs for AI countries.\n\n§YUse air AI from base game or from other mods you play along with VNR.§!"
 RULE_ENG_EXPERT_NAVY: "@ENG Expert Royal Navy"
 RULE_USA_EXPERT_NAVY: "@USA Expert United States Navy"
 RULE_JAP_EXPERT_NAVY: "@JAP Expert Imperial Japanese Navy"
 RULE_AI_EXPERT_NAVY_BLOCKED_DESC: "Starting ships of this country will not be changed."
 RULE_AI_EXPERT_NAVY_FREE_DESC: "Switch all starting ships of this country to expert AI designs.\n\nThis rule only takes effect when §YAI Ship Design Style§! is set to §CExpert§! and this country is §RAI controlled§!."